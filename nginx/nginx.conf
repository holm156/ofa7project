events {
    worker_connections 1024;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Include MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version
    server_tokens off;

    # Cloudflare Real IP Configuration
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Limit connection count per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream app_server {
        server app:3000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name duskscans.com www.duskscans.com dash.duskscans.com cdn.duskscans.com;
        return 301 https://$host$request_uri;
    }

    # CDN Server
    server {
        listen 443 ssl;
        server_name cdn.duskscans.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            root /usr/share/nginx/html;
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "public, max-age=2592000, no-transform";
            
            # Re-add security headers for this location as add_header is not inherited if used inside location
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

            try_files $uri =404;
            access_log off;
        }

        # Explicitly handle images to ensure correct MIME types
        location ~* \.(webp|jpg|jpeg|png|gif|ico|svg)$ {
            root /usr/share/nginx/html;
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "public, max-age=2592000, no-transform";
            
            # Additional security headers for images
            add_header X-Content-Type-Options "nosniff";
            
            # Explicitly set types just in case mime.types is incomplete
            types {
                image/webp webp;
                image/jpeg jpg jpeg;
                image/png png;
                image/gif gif;
                image/x-icon ico;
                image/svg+xml svg;
            }
            
            try_files $uri =404;
            access_log off;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name duskscans.com www.duskscans.com dash.duskscans.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Optimization for Cloudflare
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Redirect to Discord when site is down (502, 503, 504)
        error_page 502 503 504 = @fallback;
        location @fallback {
            return 302 https://discord.gg/9MndT8DGMF;
        }

        # Max upload size (for manga pages/covers)
        client_max_body_size 100M;

        # Rate limit for login/register (prevent brute force)
        location ~ ^/api/(auth|register) {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://app_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Re-add security headers for this location
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }

        # Rate limit for general API calls
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Re-add security headers for this location
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }

        # General pages with connection limit
        location / {
            limit_req zone=general burst=20 nodelay;
            limit_conn conn_limit 20;
            proxy_pass http://app_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Re-add security headers for this location
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }
    }
}
